- name: install docker to RHEL systems
  become: yes
  hosts: all


  tasks:
    - name: Uninstall old versions
      dnf:
        name: "{{ item }}"
        state: absent
      loop:
        - docker
        - docker-client
        - docker-client-latest
        - docker-common
        - docker-latest
        - docker-latest-logrotate
        - docker-logrotate
        - docker-engine
        - podman
        - runc
    - name: Set up repository
      dnf:
        name: dnf-plugins-core
        state: present
    - shell: sudo dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
      register: out
    
    - debug:
        var: out.stdout

    - name: Install docker
      dnf:
        name: "{{ item }}"
        state: present
      loop:
        - docker-ce
        - docker-ce-cli 
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
    - name: Start Docker Engine
      service:
        name: docker
        state: started
        enabled: yes
    - name: Verify that the installation is successfull
      shell: sudo docker run hello-world
      register: result

    - debug:
        var: result.stdout




        
